<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Merger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 0.875rem;
      margin-bottom: 24px;
    }

    .drop-zone {
      border: 2px dashed #c0c8d8;
      border-radius: 8px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #888;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #4f7ef8;
      background: #f0f4ff;
      color: #4f7ef8;
    }

    .drop-zone svg { margin-bottom: 10px; }

    .drop-zone p { font-size: 0.9rem; }
    .drop-zone span { font-size: 0.8rem; color: #aaa; }

    #file-input { display: none; }

    .file-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f7f8fc;
      border: 1px solid #e4e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: grab;
      transition: background 0.15s;
    }

    .file-item:active { cursor: grabbing; }
    .file-item.dragging { opacity: 0.4; }
    .file-item.drag-target { border-color: #4f7ef8; background: #f0f4ff; }

    .file-icon {
      width: 32px;
      height: 32px;
      background: #fee2e2;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.65rem;
      font-weight: 700;
      color: #dc2626;
    }

    .file-name {
      flex: 1;
      font-size: 0.875rem;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-size {
      font-size: 0.75rem;
      color: #aaa;
      flex-shrink: 0;
    }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover { color: #dc2626; }

    .drag-hint {
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
      margin-top: 8px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:not(:disabled):active { transform: scale(0.98); }

    .btn-secondary {
      background: #f0f2f5;
      color: #555;
    }

    .btn-secondary:not(:disabled):hover { background: #e4e8f0; }

    .btn-primary {
      background: #4f7ef8;
      color: white;
    }

    .btn-primary:not(:disabled):hover { background: #3b6de8; }

    .status {
      margin-top: 16px;
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
      color: #555;
    }

    .status.error { color: #dc2626; }
    .status.success { color: #16a34a; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px;
      width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .modal h2 { font-size: 1.1rem; margin-bottom: 6px; color: #1a1a2e; }
    .modal p { font-size: 0.8rem; color: #888; margin-bottom: 16px; }

    .input-group {
      display: flex;
      align-items: center;
      border: 1.5px solid #c0c8d8;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .input-group:focus-within { border-color: #4f7ef8; }

    .input-group input {
      flex: 1;
      border: none;
      outline: none;
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #333;
    }

    .input-group .ext {
      padding: 10px 12px 10px 0;
      color: #888;
      font-size: 0.9rem;
      background: white;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>PDF Merger</h1>
  <p class="subtitle">Combine multiple PDFs into one — everything stays local.</p>

  <div class="drop-zone" id="drop-zone">
    <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
    </svg>
    <p>Drop PDF files here or <strong>click to browse</strong></p>
    <span>Files will merge in the order listed below</span>
    <input type="file" id="file-input" accept=".pdf,application/pdf" multiple>
  </div>

  <div class="file-list" id="file-list"></div>
  <p class="drag-hint" id="drag-hint" style="display:none">Drag files to reorder</p>

  <div class="actions">
    <button class="btn btn-secondary" id="clear-btn" disabled>Clear</button>
    <button class="btn btn-primary" id="merge-btn" disabled>Merge & Save</button>
  </div>

  <p class="status" id="status"></p>
</div>

<!-- Filename modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Save merged PDF</h2>
    <p>Enter a name for the output file.</p>
    <div class="input-group">
      <input type="text" id="filename-input" placeholder="merged" maxlength="200" spellcheck="false">
      <span class="ext">.pdf</span>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" style="flex:0 0 auto;padding:12px 20px" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const fileList    = document.getElementById('file-list');
  const dragHint    = document.getElementById('drag-hint');
  const clearBtn    = document.getElementById('clear-btn');
  const mergeBtn    = document.getElementById('merge-btn');
  const statusEl    = document.getElementById('status');
  const modal       = document.getElementById('modal');
  const filenameInput = document.getElementById('filename-input');
  const modalCancel = document.getElementById('modal-cancel');
  const modalSave   = document.getElementById('modal-save');

  let files = []; // { file: File, id: number }
  let idCounter = 0;
  let dragSrcId = null;

  // ── Drop zone ───────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function addFiles(incoming) {
    const pdfs = incoming.filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
    if (pdfs.length !== incoming.length) {
      setStatus('Only PDF files are accepted.', 'error');
    }
    pdfs.forEach(f => files.push({ file: f, id: idCounter++ }));
    render();
  }

  // ── Render list ──────────────────────────────────────────────
  function render() {
    fileList.innerHTML = '';
    files.forEach(({ file, id }) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.dataset.id = id;
      item.draggable = true;

      item.innerHTML = `
        <div class="file-icon">PDF</div>
        <span class="file-name" title="${escHtml(file.name)}">${escHtml(file.name)}</span>
        <span class="file-size">${fmtSize(file.size)}</span>
        <button class="remove-btn" title="Remove" data-id="${id}">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      `;

      // reorder drag events
      item.addEventListener('dragstart', onDragStart);
      item.addEventListener('dragover',  onDragOver);
      item.addEventListener('dragleave', onDragLeave);
      item.addEventListener('drop',      onDrop);
      item.addEventListener('dragend',   onDragEnd);

      // remove button — stop propagation so it doesn't start a drag
      item.querySelector('.remove-btn').addEventListener('mousedown', e => e.stopPropagation());
      item.querySelector('.remove-btn').addEventListener('click', e => {
        e.stopPropagation();
        const rid = parseInt(e.currentTarget.dataset.id);
        files = files.filter(f => f.id !== rid);
        render();
        clearStatus();
      });

      fileList.appendChild(item);
    });

    const hasFiles = files.length > 0;
    dragHint.style.display  = files.length > 1 ? 'block' : 'none';
    clearBtn.disabled  = !hasFiles;
    mergeBtn.disabled  = files.length < 2;
  }

  // ── Drag-to-reorder ──────────────────────────────────────────
  function onDragStart(e) {
    dragSrcId = parseInt(e.currentTarget.dataset.id);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    // stop the drop zone from capturing this drag
    e.stopPropagation();
  }

  function onDragOver(e) {
    if (dragSrcId === null) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-target');
  }

  function onDragLeave(e) { e.currentTarget.classList.remove('drag-target'); }

  function onDrop(e) {
    if (dragSrcId === null) return;
    e.preventDefault();
    e.stopPropagation();
    const targetId = parseInt(e.currentTarget.dataset.id);
    if (targetId !== dragSrcId) {
      const srcIdx  = files.findIndex(f => f.id === dragSrcId);
      const tgtIdx  = files.findIndex(f => f.id === targetId);
      const [moved] = files.splice(srcIdx, 1);
      files.splice(tgtIdx, 0, moved);
      render();
    }
    e.currentTarget.classList.remove('drag-target');
  }

  function onDragEnd(e) {
    dragSrcId = null;
    document.querySelectorAll('.file-item').forEach(el => {
      el.classList.remove('dragging', 'drag-target');
    });
  }

  // ── Clear ────────────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    files = [];
    render();
    clearStatus();
  });

  // ── Merge ────────────────────────────────────────────────────
  mergeBtn.addEventListener('click', () => {
    filenameInput.value = 'merged';
    modal.classList.add('open');
    setTimeout(() => {
      filenameInput.focus();
      filenameInput.select();
    }, 50);
  });

  modalCancel.addEventListener('click', () => modal.classList.remove('open'));

  modal.addEventListener('click', e => {
    if (e.target === modal) modal.classList.remove('open');
  });

  filenameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') modalSave.click();
    if (e.key === 'Escape') modal.classList.remove('open');
  });

  modalSave.addEventListener('click', async () => {
    let name = filenameInput.value.trim() || 'merged';
    // Strip trailing .pdf if user typed it
    if (name.toLowerCase().endsWith('.pdf')) name = name.slice(0, -4);
    modal.classList.remove('open');
    await mergePdfs(name + '.pdf');
  });

  async function mergePdfs(filename) {
    setStatus('Merging…');
    mergeBtn.disabled = true;

    try {
      const { PDFDocument } = PDFLib;
      const merged = await PDFDocument.create();

      for (const { file } of files) {
        const bytes = await file.arrayBuffer();
        const src   = await PDFDocument.load(bytes);
        const pages = await merged.copyPages(src, src.getPageIndices());
        pages.forEach(p => merged.addPage(p));
      }

      const pdfBytes = await merged.save();
      const blob     = new Blob([pdfBytes], { type: 'application/pdf' });
      const url      = URL.createObjectURL(blob);

      const a   = document.createElement('a');
      a.href    = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);

      setStatus(`Saved as "${filename}"`, 'success');
    } catch (err) {
      console.error(err);
      setStatus('Failed to merge: ' + err.message, 'error');
    } finally {
      mergeBtn.disabled = files.length < 2;
    }
  }

  // ── Helpers ──────────────────────────────────────────────────
  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className   = 'status ' + type;
  }

  function clearStatus() { statusEl.textContent = ''; statusEl.className = 'status'; }

  function fmtSize(bytes) {
    if (bytes < 1024)        return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
